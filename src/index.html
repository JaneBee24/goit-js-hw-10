<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoIT JS Homework 10</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <div id="timer-container"></div>
    <div id="snackbar-container"></div>
    
    <script>
      async function loadHTML(url, containerId) {
        const response = await fetch(url);
        if (response.ok) {
          document.getElementById(containerId).innerHTML = await response.text();
        } else {
          console.error(`Ошибка загрузки ${url}`);
        }
      }
    
      loadHTML("/src/1-timer.html", "timer-container");
      loadHTML("/src/2-snackbar.html", "snackbar-container");
    </script>    

    <script type="module" src="./js/1-timer.js"></script>
    <script type="module" src="./js/2-snackbar.js"></script>
</body>
</html>
